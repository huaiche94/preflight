version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - revive
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          disabled: true # package-doc/exported-comment discipline is enforced by review, not lint, at this stage
  exclusions:
    generated: lax
    rules:
      # Test files commonly shadow package-level identifiers (e.g. "err")
      # and use table-driven patterns gocritic flags as overly strict;
      # keep signal high on production code instead.
      - path: _test\.go
        linters:
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
