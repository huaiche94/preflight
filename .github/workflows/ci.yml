name: CI

# vertical-slice CI scaffold (qa-01). Mirrors Auspex_ADD.md §30.3's ci.yml jobs
# (format / vet / golangci-lint / unit+integration / race / build) that are
# in scope for the current vertical slice, plus the vscode job added when
# the vscode/ tree landed (issue #10). JSON Schema checks, docs link/fence
# checks, and migration tests remain deliberately left for a later CI node
# once those trees exist, rather than scaffolding jobs against paths that
# don't exist yet (Constitution §7 rule 10).
#
# All steps below call into Taskfile.yml/Makefile targets rather than
# reimplementing raw go/golangci-lint invocations, per this node's
# instruction not to duplicate or conflict with foundation's task runner.

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Version-pinning policy (owner decision, 2026-07-13): every tool version
# here is EXACT — no "latest", no "1.26.x"/"3.x" floats. A floating spec is
# how the lint job broke invisibly (golangci-lint-action@v6's "latest"
# resolved to a go1.24-built v1.64.8 that refused the Go 1.26.5 module).
# Bump these deliberately, in their own commit, alongside the matching
# local-toolchain upgrade.
env:
  GO_VERSION: "1.26.5" # matches go.mod's go directive

jobs:
  # Format, vet, and lint are OS-invariant (they inspect source text and
  # AST, not compiled/OS-specific behavior), so they run once on Ubuntu
  # rather than across the full matrix - a trivial PR does not need three
  # redundant lint runs to get a real, fast signal.
  lint:
    name: fmt + vet + lint (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        # v8 of the action installs golangci-lint v2.x (matching
        # .golangci.yml's `version: "2"` config and the Go 1.26
        # toolchain); v6's "latest" tops out at v1.64.8, which is built
        # with go1.24 and refuses to load the config against Go 1.26.5.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          # golangci-lint-action runs its own lint step; skip-cache-save
          # avoids double-caching against setup-go's module cache.
          install-mode: binary

      # The fmt/lint steps below call Taskfile targets, so this job needs
      # the Task runner just like build-and-test does; without it they
      # die on "task: command not found" before checking anything.
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: "3.52.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task fmt
        run: task fmt

      - name: task lint
        run: task lint

  # Build and test run across the full OS matrix per Auspex_ADD.md
  # §30.3 ("Matrix: Ubuntu/macOS/Windows, Go 1.26.x") - Auspex ships a
  # single static binary on all three, so build/test must be verified
  # natively on each, not cross-compiled and assumed.
  build-and-test:
    name: build + test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: "3.52.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: task build
        run: task build

      # Go's race detector requires cgo and a working C toolchain
      # (-race sets CGO_ENABLED=1 and links a C runtime component).
      # Ubuntu and macOS GitHub-hosted runners ship a C toolchain
      # (gcc/clang) by default, so `task test` (which always runs
      # `go test -race`) works unmodified there. windows-latest runners
      # do carry a working cgo toolchain today, but the race detector
      # has a long history of being the least reliable combination on
      # Windows CI (slower, occasionally flaky instrumentation, and not
      # all Go/gcc-on-Windows pairings behave identically across
      # windows-latest image updates) - so Windows deliberately runs the
      # non-race test target instead of the race one, trading a small
      # amount of race-detection coverage on that OS for a matrix job
      # that isn't a recurring source of environment-flake noise. Race
      # coverage is not lost project-wide: ubuntu-latest and
      # macos-latest both run the full `-race` suite every PR.
      - name: task test (race)
        if: runner.os != 'Windows'
        run: task test

      - name: task test:short (no race on Windows)
        if: runner.os == 'Windows'
        run: task test:short

  # VS Code companion extension (issue #10): typecheck/build + unit tests
  # via Node's built-in test runner. Ubuntu-only — the extension is pure
  # TypeScript over Node built-ins (no native modules, no OS-conditional
  # code paths at build time; the per-OS path logic is unit-tested with
  # injected env on any host), so one OS gives full signal. Node version
  # is EXACT per the same pinning policy as GO_VERSION above.
  vscode:
    name: vscode extension (ubuntu-latest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: build + unit tests (node --test)
        run: npm test
