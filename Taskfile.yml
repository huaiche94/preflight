version: "3"

vars:
  BIN: preflight
  PKGS: ./...

tasks:
  default:
    desc: Run fmt, lint, and test (the same checks CI runs).
    cmds:
      - task: fmt
      - task: lint
      - task: test

  build:
    desc: Build the preflight binary into ./bin.
    cmds:
      - mkdir -p bin
      - go build -o bin/{{.BIN}} ./cmd/preflight

  run:
    desc: Build and run the preflight binary, forwarding extra args (task run -- version).
    deps: [build]
    cmds:
      - ./bin/{{.BIN}} {{.CLI_ARGS}}

  test:
    desc: Run the full test suite with race detection.
    cmds:
      - go test -race {{.PKGS}}

  test:short:
    desc: Run the test suite without -race, for fast local iteration.
    cmds:
      - go test {{.PKGS}}

  fmt:
    desc: Check formatting; fails if gofmt would change any file (does not rewrite files).
    cmds:
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "gofmt would reformat:"
          echo "$unformatted"
          exit 1
        fi

  fmt:fix:
    desc: Reformat all Go files in place with gofmt.
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet across the module.
    cmds:
      - go vet {{.PKGS}}

  lint:
    desc: Run golangci-lint (requires golangci-lint on PATH; see https://golangci-lint.run/welcome/install/).
    deps: [vet]
    cmds:
      - golangci-lint run {{.PKGS}}

  tidy:
    desc: Run go mod tidy and fail if it produces a diff (drift check for CI).
    cmds:
      - go mod tidy
      - |
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "go.mod/go.sum are not tidy; run 'task tidy' and commit the result."
          git diff go.mod go.sum
          exit 1
        fi

  clean:
    desc: Remove build artifacts.
    cmds:
      - rm -rf bin
